spring:
  application:
    name: paybridge
  profiles:
    default: local
  thymeleaf:
    cache: false
  mvc:
    problemdetails:
      enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

server:
  error:
    whitelabel:
      enabled: false
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.paybridge: INFO
  pattern:
    level: "%5p [corr:%X{correlationId:-n/a}]"

paybridge:
  app:
    display-name: PayBridge
    subtitle: Payment Orchestration Service
    ui-strategy: Spring MVC + server-rendered pages + minimal JS
    architecture-style: Modular Monolith
  features:
    nicepay-enabled: false
    stripe-enabled: false
    nicepay-local-only: true
    unified-checkout-enabled: false
    operator-api-enabled: false
  security:
    operator-username: ${PAYBRIDGE_OPERATOR_USERNAME:operator}
    operator-password: ${PAYBRIDGE_OPERATOR_PASSWORD:operator-change-me}
    console-allowed-origins: ${PAYBRIDGE_CONSOLE_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  providers:
    nicepay:
      enabled: ${PAYBRIDGE_NICEPAY_PROVIDER_ENABLED:false}
      base-url: https://webapi.nicepay.co.kr/webapi
      merchant-id: ${PAYBRIDGE_NICEPAY_MID:}
      merchant-key: ${PAYBRIDGE_NICEPAY_MERCHANT_KEY:}
      connect-timeout: 5s
      read-timeout: 30s
    stripe:
      enabled: ${PAYBRIDGE_STRIPE_PROVIDER_ENABLED:false}
      base-url: https://api.stripe.com
      publishable-key: ${PAYBRIDGE_STRIPE_PUBLISHABLE_KEY:}
      secret-key: ${PAYBRIDGE_STRIPE_SECRET_KEY:}
      webhook-signing-secret: ${PAYBRIDGE_STRIPE_WEBHOOK_SECRET:}
      default-currency: ${PAYBRIDGE_STRIPE_DEFAULT_CURRENCY:USD}
      connect-timeout: 5s
      read-timeout: 30s
