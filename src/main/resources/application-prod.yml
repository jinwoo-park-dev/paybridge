spring:
  thymeleaf:
    cache: true
  datasource:
    url: ${PAYBRIDGE_DB_URL}
    username: ${PAYBRIDGE_DB_USERNAME}
    password: ${PAYBRIDGE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  flyway:
    clean-disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

paybridge:
  features:
    stripe-enabled: ${PAYBRIDGE_STRIPE_ENABLED:false}
    nicepay-enabled: ${PAYBRIDGE_NICEPAY_ENABLED:false}
    nicepay-local-only: ${PAYBRIDGE_NICEPAY_LOCAL_ONLY:false}
    unified-checkout-enabled: false
    operator-api-enabled: ${PAYBRIDGE_OPERATOR_API_ENABLED:false}
  security:
    operator-username: ${PAYBRIDGE_OPERATOR_USERNAME}
    operator-password: ${PAYBRIDGE_OPERATOR_PASSWORD}
