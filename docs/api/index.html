<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayBridge API Reference</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body {
      margin: 0;
      background: #f8fafc;
    }

    .paybridge-header {
      padding: 18px 24px;
      border-bottom: 1px solid #e2e8f0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .paybridge-header h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .paybridge-header p {
      max-width: 960px;
      margin: 0;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .paybridge-header a {
      color: #93c5fd;
    }

    .paybridge-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    .swagger-ui .topbar {
      display: none;
    }
  </style>
</head>
<body>
  <header class="paybridge-header">
    <h1>PayBridge API Reference</h1>
    <p>
      Static OpenAPI documentation for JSON endpoints. The public EC2 demo keeps runtime Swagger UI disabled, so this page serves as the API reference for the project.
    </p>
    <nav class="paybridge-links" aria-label="PayBridge documentation links">
      <a href="../">Project Docs</a>
      <a href="../openapi/paybridge-public.yaml">OpenAPI YAML</a>
      <a href="https://github.com/jinwoo-park-dev/paybridge">GitHub Repository</a>
    </nav>
  </header>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.addEventListener('load', function () {
      window.ui = SwaggerUIBundle({
        url: '../openapi/paybridge-public.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        docExpansion: 'list',
        defaultModelsExpandDepth: 1,
        displayRequestDuration: true,
        supportedSubmitMethods: [],
        validatorUrl: null
      });
    });
  </script>
</body>
</html>
